[env:teensy31]
platform = teensy
board = teensy31
framework = arduino
lib_deps =
    adafruit/Adafruit BusIO @ 1.3.2
    adafruit/Adafruit Unified Sensor @ 1.1.3
    adafruit/Adafruit INA219 @ 1.0.9
    adafruit/Adafruit BMP280 Library @ 2.1.0
    bolderflight/Bolder Flight Systems SBUS @ 1.0.1
    mikalhart/TinyGPSPlus @ 1.0.2
    https://github.com/tonton81/WDT_T4#a5e3d3abdce1a2362562337e345524d4c953a824
   
