; PlatformIO Project Configuration File for the LockDownRadioControl
; receiver (RXV2). Single source-tree builds either over USB-C (xiao_usb)
; or over WiFi via ArduinoOTA (xiao_ota).
;
; Web assets live in data/ and are uploaded to the chip's LittleFS partition:
;     pio run -e xiao_ota -t uploadfs

[common]
framework = arduino
platform = espressif32
monitor_speed = 115200
board_build.filesystem = littlefs
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    nrf24/RF24 @ 1.4.10
extra_scripts = post:dev/archive_firmware.py

; ============== ESP32-C3 (original prototype chip) ==============
[env:xiao_usb]
extends = common
board = seeed_xiao_esp32c3
upload_protocol = esptool
upload_port = /dev/cu.usbmodem31101
upload_speed = 921600

[env:xiao_ota]
extends = common
board = seeed_xiao_esp32c3
upload_protocol = espota
upload_port = LDRC_RX.local

; ============== ESP32-S3 (production chip — 20 units arrived) ==============
; The S3 builds use TinyUSB (ARDUINO_USB_MODE=0) instead of the hardware
; USB-Serial/JTAG, so the receiver can ALSO present a USB HID joystick and
; drive a flight sim directly from the channels it receives ("Drive simulator
; over USB" on the home page, gated by an NVS flag — see SimUsb.h). This is a
; firmware-wide USB change: with MODE=0/CDC_ON_BOOT=0 the global `Serial` is no
; longer the USB-CDC port (debug logging moves to UART0); the in-RAM event log
; (/blackbox) is unaffected. Platform pinned to 6.6.0 to match the HID
; enumeration proven on this chip by the LDRC2SIM project.
[s3]
extends = common
board = seeed_xiao_esp32s3
platform = espressif32@6.6.0
build_unflags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0

[env:xiao_s3_usb]
extends = s3
upload_protocol = esptool
upload_port = /dev/cu.usbmodem31101
upload_speed = 921600

[env:xiao_s3_ota]
extends = s3
upload_protocol = espota
upload_port = LDRC_RX.local
