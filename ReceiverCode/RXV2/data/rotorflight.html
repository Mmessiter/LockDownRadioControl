<button class=helpBtn aria-label=Help title=Help onclick="LDRC.showHelp()">?</button>
<div class=bg-photo aria-hidden=true></div>
<div class=bg-wash  aria-hidden=true></div>
<div class=container>
    <h1>Rotorflight</h1>
    <p class=subtitle id=fcInfo>&hellip;</p>

    <a class="btn btn-fw" href="/rotorflight-pid"        style="background:#8e6cab"><span class=ico>&#9881;&#65039;</span>PIDs</a>
    <a class="btn btn-fw" href="/rotorflight-pidplus"    style="background:#8e6cab"><span class=ico>&#9881;&#65039;</span>PID + (advanced)</a>

    <a class="btn btn-back" href="/"><span class=ico>&#8617;</span>Return to menu</a>
    <div class=footer></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    const s = await LDRC.fetchState();
    if (!s) return;
    const fc = s.fcinfo || {};
    const label = (fc.rf_major > 0)
        ? ('Rotorflight ' + fc.rf_major + '.' + fc.rf_minor + ' (BetaFlight ' + fc.fw_major + '.' + fc.fw_minor + '.' + fc.fw_patch + ' • API ' + fc.api_major + '.' + fc.api_minor + ')')
        : (fc.detected ? fc.variant : 'Flight controller connected (version pending)');
    LDRC.setText('fcInfo', label);
});
</script>
<template id=helpContent><h2>Rotorflight</h2>
<p>The gateway to live Rotorflight configuration over the receiver's MSP bridge. From here you reach PID tuning, rate curves, governor settings, and saved snapshots.</p>
<h3>How to use it</h3>
<p>Tap any of the sub-pages. Each one talks directly to the flight controller; values you change are written to the FC immediately, in real time.</p>
<h3>Requirements</h3>
<p>This page needs the protocol set to <b>CRSF</b> and a Rotorflight-compatible FC connected. If the FC isn't responding, sub-pages show clear timeout messages instead of hanging.</p>
<h3>Tip — snapshot before tuning</h3>
<p>The <b>Backups</b> sub-page lets you save the FC's current state by name and restore it later. Always snapshot a known-good config before experimenting.</p>
</template>
</body>
