<!doctype html>
<html lang=en>
<head>
<meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name=theme-color content="#5fa099">
<meta name=apple-mobile-web-app-capable content=yes>
<meta name=apple-mobile-web-app-status-bar-style content=black-translucent>
<meta name=apple-mobile-web-app-title content="LDRC RX V2">
<title>Home &middot; LDRC RX V2</title>
<link rel=stylesheet href="/style.css?v=25">
<script src="/app.js?v=25" defer></script>
</head>
<body>
<div class=bg-photo aria-hidden=true></div>
<div class=bg-wash  aria-hidden=true></div>
<div class=container>
    <h1>LDRC RX V2</h1>
    <p class=subtitle id=subtitle>loading&hellip;</p>

    <div id=radioBanner style="display:none;text-align:center;padding:.7em;border-radius:10px;margin:0 0 1em;font-weight:600"></div>

    <a class="btn btn-fly"  href="/fly"><span class=ico>&#128641;&#9992;&#65039;</span>Fly now</a>
    <a class="btn btn-bind" href="/bind"><span class=ico>&#128279;</span>Start Bind mode</a>
    <a class="btn btn-bb"   href="/rotorflight" id=rfbtn style="display:none;background:#8e6cab"><span class=ico>&#129357;</span>Rotorflight config &mdash; <span id=fcver>&hellip;</span></a>
    <a class="btn btn-fw"   href="/firmware"><span class=ico>&#128229;</span>Update or roll back firmware</a>
    <a class="btn btn-diag" href="/diagnostics"><span class=ico>&#127916;</span>View channels</a>
    <a class="btn btn-bb"   href="/blackbox"><span class=ico>&#128209;</span>Black box log</a>
    <a class="btn btn-fw"   href="/wifi" id=wifibtn style="display:none"><span class=ico>&#128246;</span>WiFi settings</a>
    <a class="btn btn-diag" href="/protocol"><span class=ico>&#128225;</span>Output protocol &mdash; <span id=protoname>&hellip;</span></a>

    <div id=fwBanner style="display:none;text-align:center;padding:.7em;border-radius:10px;margin:1em 0 0;font-weight:600"></div>

    <div class=footer></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    const s = await LDRC.fetchState();
    if (!s) { LDRC.setText('subtitle', 'connection lost — try refresh'); return; }

    LDRC.setText('protoname', s.protocol.current);

    // Show WiFi-settings button only when WiFi is up or in AP mode.
    const wifiVisible = (s.net.mode === 'WiFi up' || s.net.mode === 'AP mode');
    const wb = document.getElementById('wifibtn');
    if (wb) wb.style.display = wifiVisible ? '' : 'none';

    // Show Rotorflight config button when FC is reachable on CRSF.
    const rfb = document.getElementById('rfbtn');
    if (rfb && s.fcinfo && s.fcinfo.rotorflight_capable) {
        rfb.style.display = '';
        const fc = s.fcinfo;
        const label = (fc.rf_major > 0)
            ? ('Rotorflight ' + fc.rf_major + '.' + fc.rf_minor)
            : 'Flight controller connected';
        LDRC.setText('fcver', label);
    }

    // Subtitle reflects current state.
    let subtitle = '';
    if (s.net.mode === 'AP mode') {
        subtitle = "AP mode — join '" + (s.info.ap_ssid || 'LDRC_RX') + "' &amp; set your WiFi";
    } else if (s.bind.bound) {
        const alive = s.rf.last_pkt_ms >= 0 && s.rf.last_pkt_ms < 500;
        subtitle = alive ? 'Bound &amp; receiving — ready to fly' : 'Bound, waiting for transmitter';
    } else {
        subtitle = 'Unbound — tap <b>Start Bind</b> below';
    }
    LDRC.setHtml('subtitle', subtitle);

    // Transceiver-presence banner at the top — shows which radio slots
    // came up at boot. A 3-slot PCB with one dead chip is immediately
    // visible here ("2 transceivers detected: slots 1 and 3").
    paintRadioBanner(s);

    // Background check: is a firmware update available? Banner is at the
    // bottom of the screen (moved here so the transceiver banner can
    // own the prime real-estate at the top).
    checkFirmware(s.info.fw_version);
});

function paintRadioBanner(s) {
    const rb = document.getElementById('radioBanner');
    if (!rb) return;
    const rf      = s.rf || {};
    const present = rf.radios_present || [];
    const slots   = [];
    present.forEach((on, i) => { if (on) slots.push(i + 1); });
    const n = (typeof rf.radios_count === 'number') ? rf.radios_count : slots.length;
    let label, bg, fg;
    if (n === 0) {
        label = '⚠️ No transceivers detected';
        bg = 'rgba(220,160,140,.95)'; fg = '#5c2a1a';
    } else {
        const noun = (n === 1) ? 'transceiver' : 'transceivers';
        const list = (slots.length === 1) ? ('slot ' + slots[0])
                   : (slots.length === 2) ? ('slots ' + slots[0] + ' and ' + slots[1])
                   :                        ('slots ' + slots.slice(0, -1).join(', ') + ', and ' + slots[slots.length-1]);
        label = '✓  ' + n + ' ' + noun + ' detected: ' + list;
        bg = 'rgba(168,210,154,.85)'; fg = '#2a4d1f';
    }
    rb.textContent       = label;
    rb.style.background  = bg;
    rb.style.color       = fg;
    rb.style.display     = '';
}

const MANIFEST_URL = 'http://m4macmini.local:8000/manifest.json';

function vTuple(n){ const m=n.match(/RXV2-(\d+)\.(\d+)\.(\d+)/); return m?[+m[1],+m[2],+m[3]]:[0,0,0]; }
function vCmp(a,b){ const ta=vTuple(a),tb=vTuple(b); for(let i=0;i<3;i++) if(tb[i]!==ta[i]) return tb[i]-ta[i]; return 0; }

async function checkFirmware(current) {
    const b = document.getElementById('fwBanner');
    try {
        const r = await fetch(MANIFEST_URL, { cache: 'no-store' });
        if (!r.ok) throw 0;
        const data = await r.json();
        const versions = (data.versions || []).slice().sort((x,y) => vCmp(x.name,y.name));
        if (versions.length === 0) return;
        const latest = versions[0].name;
        if (vCmp(latest, current) < 0) {
            b.textContent = '⬆️  Update available: ' + latest;
            b.style.background = 'rgba(255,210,120,.95)';
            b.style.color = '#5c3a00';
            b.style.cursor = 'pointer';
            b.onclick = () => location.href = '/firmware';
        } else {
            b.textContent = '✓  Firmware up to date';
            b.style.background = 'rgba(168,210,154,.85)';
            b.style.color = '#2a4d1f';
        }
        b.style.display = '';
    } catch (e) {
        // silent — server might just be off
    }
}
</script>
</body>
</html>
