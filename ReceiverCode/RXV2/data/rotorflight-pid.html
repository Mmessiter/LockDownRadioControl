<!doctype html>
<html lang=en>
<head>
<meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name=theme-color content="#5fa099">
<meta name=apple-mobile-web-app-capable content=yes>
<meta name=apple-mobile-web-app-status-bar-style content=black-translucent>
<meta name=apple-mobile-web-app-title content="LDRC RX V2">
<title>PIDs &middot; LDRC RX V2</title>
<link rel=stylesheet href="/style.css?v=28">
<script src="/app.js?v=28" defer></script>
<style>
table.pids{width:100%;border-collapse:separate;border-spacing:.3em}
table.pids th{text-align:center;color:#3a5165;font-weight:600;padding:.4em 0}
table.pids th:first-child{text-align:left}
table.pids td input{width:100%;padding:.5em;font-size:1em;border:1px solid #b8c7d0;border-radius:6px;text-align:center}
.banner{padding:.7em;border-radius:10px;text-align:center;font-weight:600;margin:0 0 1em}
.banner.info{background:rgba(200,210,220,.85);color:#3a5165}
.banner.good{background:rgba(168,210,154,.85);color:#2a4d1f}
.banner.bad {background:rgba(220,160,140,.85);color:#5c2a1a}
.profRow{display:flex;gap:.5em;margin:.3em 0}
.profBtn{flex:1;padding:.7em;border:0;border-radius:10px;font-size:1.1em;font-weight:600;
         background:#cdd6df;color:#3a5165;cursor:pointer}
.profBtn.active{background:#6cab5e;color:#fff}
</style>
</head>
<body>
<button class=helpBtn aria-label=Help title=Help onclick="LDRC.showHelp()">?</button>
<div class=bg-photo aria-hidden=true></div>
<div class=bg-wash  aria-hidden=true></div>
<div class=container>
    <h1>PIDs</h1>
    <div id=status class="banner info">loading&hellip;</div>

    <div class=card>
        <h2>Profile (Bank)</h2>
        <div class=profRow>
            <button class=profBtn onclick="selectProfile(0)" id=pb0>1</button>
            <button class=profBtn onclick="selectProfile(1)" id=pb1>2</button>
            <button class=profBtn onclick="selectProfile(2)" id=pb2>3</button>
            <button class=profBtn onclick="selectProfile(3)" id=pb3>4</button>
        </div>
    </div>

    <div class=card>
        <h2>PIDs</h2>
        <table class=pids>
            <thead><tr><th></th><th>P</th><th>I</th><th>D</th><th>FF</th></tr></thead>
            <tbody>
                <tr><th>Roll</th>
                    <td><input id=r_P type=number min=0 max=1000></td>
                    <td><input id=r_I type=number min=0 max=1000></td>
                    <td><input id=r_D type=number min=0 max=1000></td>
                    <td><input id=r_F type=number min=0 max=1000></td></tr>
                <tr><th>Pitch</th>
                    <td><input id=p_P type=number min=0 max=1000></td>
                    <td><input id=p_I type=number min=0 max=1000></td>
                    <td><input id=p_D type=number min=0 max=1000></td>
                    <td><input id=p_F type=number min=0 max=1000></td></tr>
                <tr><th>Yaw</th>
                    <td><input id=y_P type=number min=0 max=1000></td>
                    <td><input id=y_I type=number min=0 max=1000></td>
                    <td><input id=y_D type=number min=0 max=1000></td>
                    <td><input id=y_F type=number min=0 max=1000></td></tr>
            </tbody>
        </table>
    </div>

    <div class=card>
        <h2>Boost &amp; HSI offsets</h2>
        <table class=pids>
            <thead><tr><th></th><th>Roll</th><th>Pitch</th><th>Yaw</th></tr></thead>
            <tbody>
                <tr><th>Boost</th>
                    <td><input id=b_R type=number min=0 max=2000></td>
                    <td><input id=b_P type=number min=0 max=2000></td>
                    <td><input id=b_Y type=number min=0 max=2000></td></tr>
                <tr><th>HSI off</th>
                    <td><input id=h_R type=number min=0 max=500></td>
                    <td><input id=h_P type=number min=0 max=500></td>
                    <td>&mdash;</td></tr>
            </tbody>
        </table>
    </div>

    <button class="btn btn-fly" id=saveBtn onclick="save()" style="background:#6cab5e"><span class=ico>&#128190;</span>Save to Flight Controller</button>
    <button class="btn btn-fw" onclick="load()"><span class=ico>&#8635;</span>Reload from flight controller</button>

    <div class=card>
        <h2>Copy to Profile (Bank) &hellip;</h2>
        <div class=profRow>
            <button class=profBtn onclick="copyTo(0)" id=cb0>1</button>
            <button class=profBtn onclick="copyTo(1)" id=cb1>2</button>
            <button class=profBtn onclick="copyTo(2)" id=cb2>3</button>
            <button class=profBtn onclick="copyTo(3)" id=cb3>4</button>
        </div>
    </div>

    <a class="btn btn-back" href="/rotorflight"><span class=ico>&#8617;</span>Back</a>
    <div class=footer></div>
</div>

<script>
const FIELDS = [
    ['r_P','r_I','r_D','r_F'],   // bytes 0..7 — Roll P,I,D,FF
    ['p_P','p_I','p_D','p_F'],   // bytes 8..15 — Pitch
    ['y_P','y_I','y_D','y_F'],   // bytes 16..23 — Yaw
    ['b_R','b_P','b_Y'],         // bytes 24..29 — Roll/Pitch/Yaw Boost
    ['h_R','h_P'],               // bytes 30..33 — Roll/Pitch HSI offset
];

function setStatus(kind, msg) {
    const b = document.getElementById('status');
    b.className = 'banner ' + kind;
    b.textContent = msg;
}

function hexToBytes(h) {
    const out = new Uint8Array(h.length / 2);
    for (let i = 0; i < out.length; i++) out[i] = parseInt(h.substr(i*2, 2), 16);
    return out;
}
function bytesToHex(b) {
    let s = '';
    for (let i = 0; i < b.length; i++) s += b[i].toString(16).padStart(2, '0').toUpperCase();
    return s;
}

let currentProfile = parseInt(localStorage.getItem('rfPidProfile') || '0');

function paintProfileButtons() {
    for (let i = 0; i < 4; i++) {
        document.getElementById('pb' + i).classList.toggle('active', i === currentProfile);
        const cb = document.getElementById('cb' + i);
        if (cb) cb.disabled = (i === currentProfile);
    }
}

async function selectProfile(idx) {
    if (idx === currentProfile) return;
    if (!(await LDRC.confirmLoseChanges('switching profile'))) return;
    setStatus('info', 'Switching to profile ' + (idx + 1) + '…');
    try {
        await LDRC.msp(210, idx.toString(16).padStart(2,'0'));
        currentProfile = idx;
        localStorage.setItem('rfPidProfile', String(idx));
        paintProfileButtons();
        await load();
    } catch (e) {
        setStatus('bad', 'Profile switch failed: ' + e.message);
    }
}

async function load() {
    setStatus('info', 'Reading PIDs from flight controller…');
    try {
        // Force FC to the profile our page is showing, so Configurator matches.
        await LDRC.msp(210, currentProfile.toString(16).padStart(2,'0'));
        const hex = await LDRC.msp(112);
        const bytes = hexToBytes(hex);
        if (bytes.length < 34) throw new Error('short response: ' + bytes.length + ' bytes');
        // Parse 17 little-endian words
        const words = [];
        for (let i = 0; i < 17; i++) words.push(bytes[i*2] | (bytes[i*2+1] << 8));
        // Map to fields in the same order as the C++/v1 layout
        const ids = ['r_P','r_I','r_D','r_F','p_P','p_I','p_D','p_F','y_P','y_I','y_D','y_F',
                     'b_R','b_P','b_Y','h_R','h_P'];
        ids.forEach((id, i) => document.getElementById(id).value = words[i]);
        setStatus('good', '✓ Loaded from flight controller');
        LDRC.clearDirty();
    } catch (e) {
        setStatus('bad', 'Read failed: ' + e.message);
    }
}

function buildPayload() {
    const ids = ['r_P','r_I','r_D','r_F','p_P','p_I','p_D','p_F','y_P','y_I','y_D','y_F',
                 'b_R','b_P','b_Y','h_R','h_P'];
    const words = ids.map(id => parseInt(document.getElementById(id).value || '0'));
    const bytes = new Uint8Array(34);
    for (let i = 0; i < 17; i++) {
        bytes[i*2]     = words[i] & 0xff;
        bytes[i*2 + 1] = (words[i] >> 8) & 0xff;
    }
    return bytes;
}

async function save() {
    if (!(await LDRC.confirm('Write these PIDs to the flight controller EEPROM?',
        {title:'Save PIDs', icon:'💾', yes:'Save to flight controller'}))) return;
    setStatus('info', 'Writing PIDs…');
    const bytes = buildPayload();
    try {
        await LDRC.msp(202, bytesToHex(bytes));   // SET_PID
        await LDRC.msp(250);                       // EEPROM_WRITE
        setStatus('good', '✓ Saved to flight controller EEPROM');
        LDRC.clearDirty();
    } catch (e) {
        setStatus('bad', 'Save failed: ' + e.message);
    }
}

async function copyTo(destIdx) {
    if (destIdx === currentProfile) { setStatus('info', 'Already on profile ' + (destIdx+1)); return; }
    if (!(await LDRC.confirm('Copy current PIDs to profile ' + (destIdx + 1) + ' and switch to it?',
        {title:'Copy to profile ' + (destIdx + 1), icon:'📋', yes:'Copy + switch', kind:'warn'}))) return;
    setStatus('info', 'Copying to profile ' + (destIdx + 1) + '…');
    const bytes = buildPayload();
    try {
        await LDRC.msp(210, destIdx.toString(16).padStart(2,'0'));   // SELECT
        await LDRC.msp(202, bytesToHex(bytes));                       // SET_PID
        await LDRC.msp(250);                                           // EEPROM_WRITE
        currentProfile = destIdx;
        localStorage.setItem('rfPidProfile', String(destIdx));
        paintProfileButtons();
        await load();
        setStatus('good', '✓ Copied to profile ' + (destIdx + 1) + ' (now editing it)');
    } catch (e) { setStatus('bad', 'Copy failed: ' + e.message); }
}

document.addEventListener('DOMContentLoaded', () => {
    paintProfileButtons();
    document.addEventListener('input', e => {
        if (e.target.matches('input, select')) LDRC.markDirty();
    });
    load();
});
</script>
<template id=helpContent><h2>Rotorflight PID</h2>
<p>Live PID tuning for Roll, Pitch and Yaw axes — P, I, D, F (feed-forward), Boost, and the other inner-loop terms — written straight to the FC over MSP.</p>
<h3>How to use it</h3>
<p>Edit any value, tap <b>Save</b>. The FC accepts the new values immediately. Take off in hover and feel the result before committing to a more aggressive flight.</p>
<h3>Safety tips</h3>
<ul>
<li>Make small changes. Doubling a P term is rarely the right move.</li>
<li>Snapshot a known-good config first via the <b>Backups</b> page.</li>
<li>If the heli misbehaves, land, restore the snapshot, try again.</li>
</ul>
</template>
</body>
</html>
